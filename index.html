<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Piscinas</title>

<style>
body{
  font-family: Arial;
  background:#f5f7fb;
  margin:0;
  padding:20px;
}
h2{
  text-align:center;
}
.card{
  background:white;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
}
input{
  width:100%;
  padding:8px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #ccc;
}
button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#1e5ea8;
  color:white;
}
</style>
</head>

<body>

<h2>💧 Cierre de Pago</h2>

<div class="card">
<h3>Fabiola</h3>
<input id="pagoF" placeholder="Pago">
<input id="extraF" placeholder="Extras">
<input id="descF" placeholder="Descuento">
<input id="totalF" placeholder="Total a pagar">
<input id="fechaF" type="date">

<button onclick="abrir('Fabiola')">🧾 Comprobante</button>
</div>

<div class="card">
<h3>Asmirian</h3>
<input id="pagoA" placeholder="Pago">
<input id="extraA" placeholder="Extras">
<input id="descA" placeholder="Descuento">
<input id="totalA" placeholder="Total a pagar">
<input id="fechaA" type="date">

<button onclick="abrir('Asmirian')">🧾 Comprobante</button>
</div>

<dialog id="modal">

<div id="recibo" style="
background:white;
padding:20px;
border-radius:20px;
max-width:420px;
margin:auto;
">

<h2 style="text-align:center;color:#1e5ea8;">
COMPROBANTE DE PAGO
</h2>

<h3 id="nombre" style="text-align:center;"></h3>

<p>Pago: <span id="pago"></span></p>
<p>Extras: <span id="extra"></span></p>
<p>Descuento: <span id="desc"></span></p>

<h3>Total: <span id="total"></span></h3>

<p>Fecha: <span id="fecha"></span></p>

<p style="text-align:center;">Gracias</p>

<button onclick="guardar()">📸 Guardar / Compartir</button>
<button onclick="modal.close()">Cerrar</button>

</div>

</dialog>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
function abrir(nombre){

let pago,extra,desc,total,fecha;

if(nombre==="Fabiola"){
  pago=pagoF.value;
  extra=extraF.value;
  desc=descF.value;
  total=totalF.value;
  fecha=fechaF.value;
}else{
  pago=pagoA.value;
  extra=extraA.value;
  desc=descA.value;
  total=totalA.value;
  fecha=fechaA.value;
}

nombreSpan = document.getElementById("nombre");
pagoSpan = document.getElementById("pago");
extraSpan = document.getElementById("extra");
descSpan = document.getElementById("desc");
totalSpan = document.getElementById("total");
fechaSpan = document.getElementById("fecha");

nombreSpan.innerText = nombre;
pagoSpan.innerText = pago;
extraSpan.innerText = extra;
descSpan.innerText = desc;
totalSpan.innerText = total;
fechaSpan.innerText = fecha;

modal.showModal();
}

function guardar(){

html2canvas(document.getElementById("recibo")).then(canvas=>{
  canvas.toBlob(blob=>{
    const file=new File([blob],"comprobante.png",{type:"image/png"});

    if(navigator.share){
      navigator.share({
        files:[file],
        title:"Comprobante"
      });
    }else{
      const link=document.createElement("a");
      link.href=URL.createObjectURL(blob);
      link.download="comprobante.png";
      link.click();
    }
  });
});

}
</script>

</body>
</html>
