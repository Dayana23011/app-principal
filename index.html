<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro Piscinas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f5f7fa;
      padding: 20px;
    }
    h1 {
      text-align: center;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
    }
    .card {
      background: white;
      padding: 15px;
      margin-top: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<h1>Registro de Piscinas</h1>

<input id="nombre" placeholder="Nombre piscina">
<input id="ubicacion" placeholder="Ubicación">
<input id="precio" placeholder="Precio">

<button onclick="guardar()">Guardar</button>

<div id="lista"></div>

<script>
  // 🔥 TU CONFIG (NO LA CAMBIES SI YA FUNCIONABA)
  const firebaseConfig = {
    apiKey: "TU_API_KEY",
    authDomain: "TU_PROYECTO.firebaseapp.com",
    projectId: "TU_PROYECTO",
  };

  const app = firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  async function guardar() {
    const nombre = document.getElementById("nombre").value;
    const ubicacion = document.getElementById("ubicacion").value;
    const precio = document.getElementById("precio").value;

    await db.collection("piscinas").add({
      nombre,
      ubicacion,
      precio
    });

    alert("Guardado ✅");
    cargar();
  }

  async function cargar() {
    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    const snapshot = await db.collection("piscinas").get();

    snapshot.forEach(doc => {
      const data = doc.data();

      lista.innerHTML += `
        <div class="card">
          <b>${data.nombre}</b><br>
          ${data.ubicacion}<br>
          💲 ${data.precio}
        </div>
      `;
    });
  }

  cargar();
</script>

</body>
</html>
