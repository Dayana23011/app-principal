<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Piscinas</title>

<style>
body{
  font-family: Arial;
  background:#f5f7fb;
  margin:0;
  padding:20px;
}

h2{
  text-align:center;
  color:#1e5ea8;
}

.card{
  background:white;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

input{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#1e5ea8;
  color:white;
  font-size:14px;
}

#reciboCard{
  background:white;
  padding:25px;
  border-radius:20px;
  max-width:420px;
  margin:auto;
  text-align:center;
}

#reciboCard h2{
  color:#1e5ea8;
  margin-bottom:10px;
}
</style>
</head>

<body>

<h2>💧 Cierre de Pago</h2>

<div class="card">
<h3>Fabiola</h3>
<input id="pagoF" placeholder="Pago">
<input id="extraF" placeholder="Extras">
<input id="descF" placeholder="Descuento">
<input id="totalF" placeholder="Total a pagar">
<input id="fechaF" type="date">

<button onclick="abrirRecibo('Fabiola')">🧾 Ver Comprobante</button>
</div>

<div class="card">
<h3>Asmirian</h3>
<input id="pagoA" placeholder="Pago">
<input id="extraA" placeholder="Extras">
<input id="descA" placeholder="Descuento">
<input id="totalA" placeholder="Total a pagar">
<input id="fechaA" type="date">

<button onclick="abrirRecibo('Asmirian')">🧾 Ver Comprobante</button>
</div>

<dialog id="modal">

<div id="reciboCard">

<h2>COMPROBANTE DE PAGO</h2>

<h3 id="nombre"></h3>

<p>💰 Pago: <span id="pago"></span></p>
<p>✨ Extras: <span id="extra"></span></p>
<p>➖ Descuento: <span id="desc"></span></p>

<h3>Total: <span id="total"></span></h3>

<p>📅 Fecha: <span id="fecha"></span></p>

<p style="margin-top:20px;">Gracias</p>

<button onclick="guardarImagen()">📸 Guardar / Compartir</button>
<button onclick="modal.close()">Cerrar</button>

</div>

</dialog>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
function abrirRecibo(nombre){

let pago,extra,desc,total,fecha;

if(nombre==="Fabiola"){
  pago=pagoF.value;
  extra=extraF.value;
  desc=descF.value;
  total=totalF.value;
  fecha=fechaF.value;
}else{
  pago=pagoA.value;
  extra=extraA.value;
  desc=descA.value;
  total=totalA.value;
  fecha=fechaA.value;
}

document.getElementById("nombre").innerText=nombre;
document.getElementById("pago").innerText=pago;
document.getElementById("extra").innerText=extra;
document.getElementById("desc").innerText=desc;
document.getElementById("total").innerText=total;
document.getElementById("fecha").innerText=fecha;

modal.showModal();
}

function guardarImagen(){

html2canvas(document.getElementById("reciboCard")).then(canvas=>{
  canvas.toBlob(blob=>{
    const file=new File([blob],"comprobante.png",{type:"image/png"});

    if(navigator.share){
      navigator.share({
        files:[file],
        title:"Comprobante"
      });
    }else{
      const link=document.createElement("a");
      link.href=URL.createObjectURL(blob);
      link.download="comprobante.png";
      link.click();
    }
  });
});

}
</script>

</body>
</html>
