<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Piscinas</title>

<style>
body{
  font-family: Arial;
  background:#f5f7fb;
  margin:0;
  padding:20px;
}
button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#1e5ea8;
  color:white;
}
input{
  width:100%;
  padding:8px;
  margin:5px 0;
}
.card{
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}
</style>
</head>

<body>

<h2>Cierre de Pago</h2>

<div class="card">
<h3>Fabiola</h3>
<input id="pagoFabiola" placeholder="Pago">
<input id="extraFabiola" placeholder="Extras">
<input id="descFabiola" placeholder="Descuento">
<input id="totalFabiola" placeholder="Total">
<input id="fechaFabiola" type="date">

<button onclick="openRecibo('Fabiola')">🧾 Comprobante</button>
</div>

<div class="card">
<h3>Asmirian</h3>
<input id="pagoAsmirian" placeholder="Pago">
<input id="extraAsmirian" placeholder="Extras">
<input id="descAsmirian" placeholder="Descuento">
<input id="totalAsmirian" placeholder="Total">
<input id="fechaAsmirian" type="date">

<button onclick="openRecibo('Asmirian')">🧾 Comprobante</button>
</div>

<!-- MODAL -->
<dialog id="modal">

<div id="recibo" style="
background:white;
padding:20px;
border-radius:20px;
max-width:400px;
margin:auto;
">

<h2 style="text-align:center;color:#1e5ea8;">
COMPROBANTE DE PAGO
</h2>

<h3 id="nombre" style="text-align:center;"></h3>

<p>Pago: <span id="pago"></span></p>
<p>Extras: <span id="extra"></span></p>
<p>Descuento: <span id="desc"></span></p>

<h3>Total: <span id="total"></span></h3>

<p>Fecha: <span id="fecha"></span></p>

<p style="text-align:center;">Gracias</p>

<button onclick="descargar()">📸 Guardar / Compartir</button>
<button onclick="modal.close()">Cerrar</button>

</div>

</dialog>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
function openRecibo(nombre){

let pago,extra,desc,total,fecha;

if(nombre==="Fabiola"){
  pago=pagoFabiola.value;
  extra=extraFabiola.value;
  desc=descFabiola.value;
  total=totalFabiola.value;
  fecha=fechaFabiola.value;
}else{
  pago=pagoAsmirian.value;
  extra=extraAsmirian.value;
  desc=descAsmirian.value;
  total=totalAsmirian.value;
  fecha=fechaAsmirian.value;
}

document.getElementById("nombre").innerText=nombre;
document.getElementById("pago").innerText=pago;
document.getElementById("extra").innerText=extra;
document.getElementById("desc").innerText=desc;
document.getElementById("total").innerText=total;
document.getElementById("fecha").innerText=fecha;

modal.showModal();
}

function descargar(){

html2canvas(document.getElementById("recibo")).then(canvas=>{
  canvas.toBlob(blob=>{
    const file=new File([blob],"comprobante.png",{type:"image/png"});

    if(navigator.share){
      navigator.share({
        files:[file],
        title:"Comprobante",
      });
    }else{
      const link=document.createElement("a");
      link.href=URL.createObjectURL(blob);
      link.download="comprobante.png";
      link.click();
    }
  });
});

}
</script>

</body>
</html>
